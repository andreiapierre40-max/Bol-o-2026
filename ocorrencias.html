<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Ocorrências — EE Maya Alice Ekman</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  :root{
    --azul-escuro:#1b3a5c;
    --azul:#2c5c8a;
    --azul-claro:#eaf1f8;
    --dourado:#c8963e;
    --verde:#3f7d5c;
    --vermelho:#b3462c;
    --cinza-texto:#3a3f44;
    --cinza-borda:#d8dde3;
    --branco:#ffffff;
    --fundo:#f4f6f8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI', Verdana, Arial, sans-serif;
    background:var(--fundo);
    color:var(--cinza-texto);
  }
  header{
    background:linear-gradient(135deg, var(--azul-escuro), var(--azul));
    color:#fff;
    padding:22px 20px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.15);
  }
  header h1{
    margin:0;
    font-size:1.4rem;
    letter-spacing:0.3px;
  }
  header p{
    margin:6px 0 0;
    font-size:0.85rem;
    opacity:0.9;
  }
  .container{
    max-width:720px;
    margin:0 auto;
    padding:20px 16px 60px;
  }
  .nav-tabs{
    display:flex;
    gap:8px;
    margin-bottom:20px;
  }
  .nav-tabs button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    background:var(--branco);
    color:var(--azul-escuro);
    font-weight:600;
    font-size:0.95rem;
    cursor:pointer;
    box-shadow:0 1px 4px rgba(0,0,0,0.08);
    transition:all 0.15s;
  }
  .nav-tabs button.active{
    background:var(--azul-escuro);
    color:#fff;
  }
  .card{
    background:var(--branco);
    border-radius:12px;
    padding:22px;
    box-shadow:0 1px 6px rgba(0,0,0,0.08);
    margin-bottom:18px;
  }
  .card h2{
    margin-top:0;
    font-size:1.1rem;
    color:var(--azul-escuro);
    border-bottom:2px solid var(--azul-claro);
    padding-bottom:10px;
  }
  label{
    display:block;
    font-size:0.85rem;
    font-weight:600;
    margin:14px 0 5px;
    color:var(--azul-escuro);
  }
  input[type=text], input[type=date], input[type=password], select, textarea{
    width:100%;
    padding:10px 12px;
    border:1px solid var(--cinza-borda);
    border-radius:8px;
    font-size:0.95rem;
    font-family:inherit;
    background:#fff;
  }
  textarea{resize:vertical; min-height:70px;}
  input:focus, select:focus, textarea:focus{
    outline:none;
    border-color:var(--azul);
    box-shadow:0 0 0 3px rgba(44,92,138,0.15);
  }
  .btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 22px;
    background:var(--azul-escuro);
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:0.95rem;
    font-weight:600;
    cursor:pointer;
    width:100%;
  }
  .btn:hover{background:var(--azul);}
  .btn-secundario{
    background:var(--verde);
  }
  .btn-secundario:hover{background:#356b4d;}
  .msg{
    margin-top:14px;
    padding:10px 14px;
    border-radius:8px;
    font-size:0.9rem;
    display:none;
  }
  .msg.sucesso{background:#e5f3ea; color:var(--verde); display:block;}
  .msg.erro{background:#fbe9e5; color:var(--vermelho); display:block;}
  .oculto{display:none !important;}
  .filtros-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px 14px;
  }
  .filtros-grid .full{grid-column:1 / -1;}
  .periodo-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  .resumo{
    display:flex;
    gap:10px;
    margin:16px 0;
    flex-wrap:wrap;
  }
  .resumo .chip{
    background:var(--azul-claro);
    color:var(--azul-escuro);
    padding:8px 14px;
    border-radius:20px;
    font-size:0.82rem;
    font-weight:600;
  }
  table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
    font-size:0.85rem;
  }
  th, td{
    padding:9px 8px;
    text-align:left;
    border-bottom:1px solid var(--cinza-borda);
  }
  th{
    background:var(--azul-claro);
    color:var(--azul-escuro);
    font-size:0.78rem;
    text-transform:uppercase;
    letter-spacing:0.4px;
  }
  tr:hover{background:#fafbfc;}
  .tag-tipo{
    display:inline-block;
    padding:3px 9px;
    border-radius:12px;
    font-size:0.72rem;
    font-weight:700;
    color:#fff;
  }
  .tag-atraso{background:#c8963e;}
  .tag-nao-realizou{background:#8a6fb0;}
  .tag-indisciplina{background:#b3462c;}
  .tag-outros{background:#5c6b73;}
  .vazio{
    text-align:center;
    color:#8a939c;
    padding:30px 10px;
    font-size:0.9rem;
  }
  .login-box{max-width:340px; margin:60px auto;}
  .acoes-relatorio{
    display:flex;
    gap:10px;
    margin-top:16px;
  }
  .acoes-relatorio .btn{margin-top:0;}
  .sair{
    background:none;
    border:none;
    color:var(--vermelho);
    font-size:0.8rem;
    cursor:pointer;
    text-decoration:underline;
    float:right;
    margin-top:-6px;
  }
  @media print{
    header, .nav-tabs, .filtros-card, .sair, .acoes-relatorio{display:none !important;}
    body{background:#fff;}
    .card{box-shadow:none; border:1px solid #ccc;}
  }
  @media (max-width:480px){
    .filtros-grid{grid-template-columns:1fr;}
    header h1{font-size:1.15rem;}
  }
</style>
</head>
<body>

<header>
  <h1>📋 Registro de Ocorrências</h1>
  <p>EE Maya Alice Ekman — Peruíbe/SP</p>
</header>

<div class="container">

  <div class="nav-tabs">
    <button id="tab-registrar" class="active" onclick="mostrarAba('registrar')">Registrar Ocorrência</button>
    <button id="tab-relatorios" onclick="mostrarAba('relatorios')">Relatórios</button>
  </div>

  <!-- ABA REGISTRAR (PROFESSORES) -->
  <div id="aba-registrar">
    <div class="card">
      <h2>Nova Ocorrência</h2>
      <form id="form-ocorrencia">
        <label>Nome do professor(a)</label>
        <input type="text" id="f-professor" required>

        <label>Turma / Sala</label>
        <input type="text" id="f-sala" placeholder="Ex: 7º Ano B" required>

        <label>Nome do aluno(a)</label>
        <input type="text" id="f-aluno" required>

        <label>Componente curricular</label>
        <select id="f-componente" required>
          <option value="">Selecione...</option>
          <option>Língua Portuguesa</option>
          <option>Matemática</option>
          <option>Ciências</option>
          <option>História</option>
          <option>Geografia</option>
          <option>Arte</option>
          <option>Educação Física</option>
          <option>Língua Inglesa</option>
          <option>Ensino Religioso</option>
          <option value="OUTROS">OUTROS</option>
        </select>
        <input type="text" id="f-componente-outros" class="oculto" placeholder="Especifique o componente curricular" style="margin-top:8px;">

        <label>Tipo de ocorrência</label>
        <select id="f-tipo" required>
          <option value="">Selecione...</option>
          <option value="Atraso">Atraso</option>
          <option value="Não realizou atividade">Não realizou atividade</option>
          <option value="Indisciplina">Indisciplina</option>
          <option value="Outros">Outros</option>
        </select>
        <input type="text" id="f-tipo-outros" class="oculto" placeholder="Especifique o tipo de ocorrência" style="margin-top:8px;">

        <label>Data</label>
        <input type="date" id="f-data" required>

        <label>Observações (opcional)</label>
        <textarea id="f-obs" placeholder="Detalhes adicionais sobre a ocorrência..."></textarea>

        <button type="submit" class="btn">Registrar Ocorrência</button>
        <div id="msg-registrar" class="msg"></div>
      </form>
    </div>
  </div>

  <!-- ABA RELATORIOS (ADMIN) -->
  <div id="aba-relatorios" class="oculto">

    <div id="login-relatorios" class="login-box card">
      <h2>Acesso restrito</h2>
      <label>Senha de administrador</label>
      <input type="password" id="senha-admin" placeholder="Digite a senha">
      <button class="btn" onclick="verificarSenha()">Entrar</button>
      <div id="msg-login" class="msg"></div>
    </div>

    <div id="painel-relatorios" class="oculto">
      <button class="sair" onclick="sairRelatorios()">Sair</button>

      <div class="card filtros-card">
        <h2>Filtros</h2>
        <div class="filtros-grid">
          <div>
            <label>Sala</label>
            <select id="filtro-sala"><option value="">Todas</option></select>
          </div>
          <div>
            <label>Aluno</label>
            <select id="filtro-aluno"><option value="">Todos</option></select>
          </div>
          <div>
            <label>Tipo de ocorrência</label>
            <select id="filtro-tipo">
              <option value="">Todos</option>
              <option value="Atraso">Atraso</option>
              <option value="Não realizou atividade">Não realizou atividade</option>
              <option value="Indisciplina">Indisciplina</option>
              <option value="Outros">Outros</option>
            </select>
          </div>
          <div>
            <label>&nbsp;</label>
            <button class="btn btn-secundario" style="margin-top:0;" onclick="limparFiltros()">Limpar filtros</button>
          </div>
          <div class="full">
            <label>Período</label>
            <div class="periodo-grid">
              <input type="date" id="filtro-data-inicio">
              <input type="date" id="filtro-data-fim">
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>Resultado</h2>
        <div class="resumo" id="resumo-chips"></div>
        <div class="acoes-relatorio">
          <button class="btn" onclick="imprimirRelatorio()">🖨️ Imprimir / Salvar PDF</button>
        </div>
        <div id="tabela-container"></div>
      </div>
    </div>
  </div>

</div>

<script>
  // ======= CONFIGURAÇÃO FIREBASE =======
  // Substitua pelos mesmos dados do projeto Bol-o-2026 (mesmo config usado no bolão / avaliação institucional)
  const firebaseConfig = {
    apiKey: "SUA_API_KEY",
    authDomain: "bolao-hexa-2026.firebaseapp.com",
    databaseURL: "https://bolao-hexa-2026-default-rtdb.firebaseio.com",
    projectId: "bolao-hexa-2026",
    storageBucket: "bolao-hexa-2026.appspot.com",
    messagingSenderId: "SEU_ID",
    appId: "SEU_APP_ID"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const REF_OCORRENCIAS = "ocorrencias2026";
  const SENHA_ADMIN = "maya2026"; // altere se desejar

  // ======= NAVEGAÇÃO =======
  function mostrarAba(aba){
    document.getElementById('aba-registrar').classList.toggle('oculto', aba !== 'registrar');
    document.getElementById('aba-relatorios').classList.toggle('oculto', aba !== 'relatorios');
    document.getElementById('tab-registrar').classList.toggle('active', aba === 'registrar');
    document.getElementById('tab-relatorios').classList.toggle('active', aba === 'relatorios');
    if(aba === 'relatorios' && sessionStorage.getItem('ocorrencias_admin') === 'ok'){
      mostrarPainel();
    }
  }

  // Data padrão = hoje
  document.getElementById('f-data').value = new Date().toISOString().split('T')[0];

  // Mostrar campo "outros" quando selecionado
  document.getElementById('f-componente').addEventListener('change', function(){
    document.getElementById('f-componente-outros').classList.toggle('oculto', this.value !== 'OUTROS');
  });
  document.getElementById('f-tipo').addEventListener('change', function(){
    document.getElementById('f-tipo-outros').classList.toggle('oculto', this.value !== 'Outros');
  });

  // ======= REGISTRAR OCORRÊNCIA =======
  document.getElementById('form-ocorrencia').addEventListener('submit', function(e){
    e.preventDefault();

    const componenteSelect = document.getElementById('f-componente').value;
    const componente = componenteSelect === 'OUTROS'
      ? (document.getElementById('f-componente-outros').value.trim() || 'Outros')
      : componenteSelect;

    const tipoSelect = document.getElementById('f-tipo').value;
    const tipo = tipoSelect === 'Outros'
      ? (document.getElementById('f-tipo-outros').value.trim() || 'Outros')
      : tipoSelect;

    const registro = {
      professor: document.getElementById('f-professor').value.trim(),
      sala: document.getElementById('f-sala').value.trim(),
      aluno: document.getElementById('f-aluno').value.trim(),
      componente: componente,
      tipo: tipo,
      data: document.getElementById('f-data').value,
      observacoes: document.getElementById('f-obs').value.trim(),
      criadoEm: Date.now()
    };

    const msg = document.getElementById('msg-registrar');
    db.ref(REF_OCORRENCIAS).push(registro)
      .then(() => {
        msg.textContent = "✅ Ocorrência registrada com sucesso!";
        msg.className = "msg sucesso";
        document.getElementById('form-ocorrencia').reset();
        document.getElementById('f-data').value = new Date().toISOString().split('T')[0];
        document.getElementById('f-componente-outros').classList.add('oculto');
        document.getElementById('f-tipo-outros').classList.add('oculto');
        setTimeout(() => { msg.style.display = 'none'; }, 4000);
      })
      .catch((err) => {
        msg.textContent = "❌ Erro ao registrar: " + err.message;
        msg.className = "msg erro";
      });
  });

  // ======= LOGIN RELATÓRIOS =======
  function verificarSenha(){
    const senha = document.getElementById('senha-admin').value;
    const msg = document.getElementById('msg-login');
    if(senha === SENHA_ADMIN){
      sessionStorage.setItem('ocorrencias_admin', 'ok');
      mostrarPainel();
    } else {
      msg.textContent = "Senha incorreta.";
      msg.className = "msg erro";
    }
  }

  function sairRelatorios(){
    sessionStorage.removeItem('ocorrencias_admin');
    document.getElementById('login-relatorios').classList.remove('oculto');
    document.getElementById('painel-relatorios').classList.add('oculto');
    document.getElementById('senha-admin').value = '';
  }

  function mostrarPainel(){
    document.getElementById('login-relatorios').classList.add('oculto');
    document.getElementById('painel-relatorios').classList.remove('oculto');
    carregarOcorrencias();
  }

  // ======= CARREGAR E FILTRAR =======
  let TODAS_OCORRENCIAS = [];

  function carregarOcorrencias(){
    db.ref(REF_OCORRENCIAS).on('value', (snapshot) => {
      const dados = snapshot.val() || {};
      TODAS_OCORRENCIAS = Object.keys(dados).map(id => ({ id, ...dados[id] }));
      popularFiltros();
      aplicarFiltros();
    });
  }

  function popularFiltros(){
    const salas = [...new Set(TODAS_OCORRENCIAS.map(o => o.sala).filter(Boolean))].sort();
    const alunos = [...new Set(TODAS_OCORRENCIAS.map(o => o.aluno).filter(Boolean))].sort();

    const selSala = document.getElementById('filtro-sala');
    const salaAtual = selSala.value;
    selSala.innerHTML = '<option value="">Todas</option>' + salas.map(s => `<option value="${s}">${s}</option>`).join('');
    selSala.value = salaAtual;

    const selAluno = document.getElementById('filtro-aluno');
    const alunoAtual = selAluno.value;
    selAluno.innerHTML = '<option value="">Todos</option>' + alunos.map(a => `<option value="${a}">${a}</option>`).join('');
    selAluno.value = alunoAtual;
  }

  ['filtro-sala','filtro-aluno','filtro-tipo','filtro-data-inicio','filtro-data-fim'].forEach(id => {
    document.getElementById(id).addEventListener('change', aplicarFiltros);
  });

  function limparFiltros(){
    document.getElementById('filtro-sala').value = '';
    document.getElementById('filtro-aluno').value = '';
    document.getElementById('filtro-tipo').value = '';
    document.getElementById('filtro-data-inicio').value = '';
    document.getElementById('filtro-data-fim').value = '';
    aplicarFiltros();
  }

  function tagClasse(tipo){
    if(tipo === 'Atraso') return 'tag-atraso';
    if(tipo === 'Não realizou atividade') return 'tag-nao-realizou';
    if(tipo === 'Indisciplina') return 'tag-indisciplina';
    return 'tag-outros';
  }

  function aplicarFiltros(){
    const sala = document.getElementById('filtro-sala').value;
    const aluno = document.getElementById('filtro-aluno').value;
    const tipo = document.getElementById('filtro-tipo').value;
    const dataIni = document.getElementById('filtro-data-inicio').value;
    const dataFim = document.getElementById('filtro-data-fim').value;

    let filtradas = TODAS_OCORRENCIAS.filter(o => {
      if(sala && o.sala !== sala) return false;
      if(aluno && o.aluno !== aluno) return false;
      if(tipo && o.tipo !== tipo) return false;
      if(dataIni && o.data < dataIni) return false;
      if(dataFim && o.data > dataFim) return false;
      return true;
    });

    filtradas.sort((a,b) => (b.data || '').localeCompare(a.data || ''));

    renderResumo(filtradas);
    renderTabela(filtradas);
  }

  function renderResumo(lista){
    const total = lista.length;
    const porTipo = {};
    lista.forEach(o => { porTipo[o.tipo] = (porTipo[o.tipo] || 0) + 1; });

    let html = `<div class="chip">Total: ${total}</div>`;
    Object.keys(porTipo).forEach(tipo => {
      html += `<div class="chip">${tipo}: ${porTipo[tipo]}</div>`;
    });
    document.getElementById('resumo-chips').innerHTML = html;
  }

  function formatarData(iso){
    if(!iso) return '—';
    const [ano,mes,dia] = iso.split('-');
    return `${dia}/${mes}/${ano}`;
  }

  function renderTabela(lista){
    const container = document.getElementById('tabela-container');
    if(lista.length === 0){
      container.innerHTML = '<div class="vazio">Nenhuma ocorrência encontrada para os filtros selecionados.</div>';
      return;
    }
    let html = `<table><thead><tr>
      <th>Data</th><th>Aluno</th><th>Sala</th><th>Componente</th><th>Tipo</th><th>Professor</th><th>Observações</th>
    </tr></thead><tbody>`;
    lista.forEach(o => {
      html += `<tr>
        <td>${formatarData(o.data)}</td>
        <td>${o.aluno || '—'}</td>
        <td>${o.sala || '—'}</td>
        <td>${o.componente || '—'}</td>
        <td><span class="tag-tipo ${tagClasse(o.tipo)}">${o.tipo || '—'}</span></td>
        <td>${o.professor || '—'}</td>
        <td>${o.observacoes || '—'}</td>
      </tr>`;
    });
    html += '</tbody></table>';
    container.innerHTML = html;
  }

  function imprimirRelatorio(){
    window.print();
  }
</script>

</body>
</html>
