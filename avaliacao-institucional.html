<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avaliação Institucional 1º Semestre - 2026 — EE Maya Alice Ekman</title>
<style>
  :root{
    --navy:#1F3864;
    --navy-deep:#132444;
    --gold:#B7862C;
    --gold-light:#D9A94F;
    --paper:#F6F4EF;
    --paper-2:#EFEBE1;
    --ink:#242019;
    --ink-soft:#5B564C;
    --line:#DCD5C4;
    --good:#4C7A54;
    --warn:#B4472E;
    --brick:#B0472E;
    --brick-light:#D3684A;
    --leaf:#3F7D4A;
    --leaf-light:#6FA86B;
    --sun:#E3A73B;
    font-family: "Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
  }
  *{box-sizing:border-box;}
  #av-root{
    background:var(--paper);
    color:var(--ink);
    min-height:100%;
    padding:0;
    line-height:1.5;
  }
  .av-shell{max-width:720px;margin:0 auto;padding:28px 20px 80px;}
  .av-hero{
    position:relative;margin:0 0 22px;border-radius:10px;overflow:hidden;
    box-shadow:0 6px 18px rgba(31,56,100,.18);
    border:3px solid #fff;outline:1px solid var(--line);
  }
  .av-hero img{width:100%;height:190px;object-fit:cover;display:block;}
  .av-hero-band{
    position:absolute;left:0;right:0;bottom:0;
    background:linear-gradient(90deg,var(--brick) 0%,var(--gold) 50%,var(--leaf) 100%);
    height:6px;
  }
  .av-hero-tag{
    position:absolute;top:10px;left:10px;
    font-family:"Helvetica Neue",Arial,sans-serif;font-size:11px;font-weight:700;
    letter-spacing:.06em;text-transform:uppercase;color:#fff;
    background:rgba(19,36,68,.72);padding:5px 11px;border-radius:20px;
  }
  .av-eyebrow{
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--gold);font-weight:700;text-align:center;margin-bottom:6px;
  }
  .av-title{
    font-size:26px;font-weight:700;color:var(--navy-deep);text-align:center;
    margin:0 0 4px;letter-spacing:.01em;
  }
  .av-title .av-title-accent{color:var(--brick);}
  .av-sub{
    font-family:"Helvetica Neue",Arial,sans-serif;
    text-align:center;color:var(--ink-soft);font-size:13.5px;margin-bottom:26px;
  }
  .av-intro{
    font-family:"Helvetica Neue",Arial,sans-serif;font-size:13px;color:var(--ink);
    background:#fff;border:1px solid var(--line);border-left:4px solid var(--gold);
    border-radius:0 3px 3px 0;padding:16px 18px;margin-bottom:24px;
  }
  .av-intro ul{margin:8px 0 0;padding-left:18px;}
  .av-intro li{margin-bottom:4px;}
  .av-progress-wrap{margin-bottom:30px;}
  .av-progress-track{height:4px;background:var(--paper-2);border-radius:2px;overflow:hidden;}
  .av-progress-fill{height:100%;background:linear-gradient(90deg,var(--brick),var(--gold),var(--leaf));transition:width .35s ease;}
  .av-progress-label{
    font-family:"Helvetica Neue",Arial,sans-serif;font-size:11.5px;color:var(--ink-soft);
    display:flex;justify-content:space-between;margin-top:6px;letter-spacing:.03em;
  }
  .av-card{
    background:#fff;border:1px solid var(--line);border-top:4px solid var(--block-color, var(--gold));
    border-radius:3px;padding:30px 28px;box-shadow:0 1px 3px rgba(31,56,100,.06);
    animation:av-fade .3s ease;
  }
  @keyframes av-fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .av-block-title{
    font-size:19px;font-weight:700;color:var(--navy-deep);margin:0 0 3px;
    display:flex;align-items:baseline;gap:10px;
  }
  .av-block-num{
    color:#fff;font-size:12.5px;font-weight:700;font-family:"Helvetica Neue",Arial,sans-serif;
    background:var(--block-color, var(--gold));padding:3px 10px;border-radius:20px;letter-spacing:.03em;
  }
  .av-block-hint{
    font-family:"Helvetica Neue",Arial,sans-serif;font-size:12.5px;color:var(--ink-soft);
    margin-bottom:22px;border-bottom:1px solid var(--line);padding-bottom:16px;
  }
  .av-item{margin-bottom:22px;}
  .av-item:last-child{margin-bottom:4px;}
  .av-item-text{font-size:15px;color:var(--ink);margin-bottom:9px;}
  .av-comment{
    width:100%;font-family:"Helvetica Neue",Arial,sans-serif;font-size:13.5px;
    border:1.5px solid var(--line);border-radius:3px;padding:11px 13px;
    resize:vertical;min-height:78px;color:var(--ink);background:var(--paper);
  }
  .av-comment:focus{outline:2px solid var(--gold-light);outline-offset:1px;}
  .av-comment.av-invalid{border-color:var(--warn);}
  .av-charcount{
    font-family:"Helvetica Neue",Arial,sans-serif;font-size:11px;color:var(--ink-soft);
    text-align:right;margin-top:4px;
  }
  .av-charcount.ok{color:var(--good);}
  .av-charcount.low{color:var(--warn);}
  .av-id-box{margin-bottom:22px;padding-bottom:18px;border-bottom:1px dashed var(--line);}
  .av-comment-label{
    font-family:"Helvetica Neue",Arial,sans-serif;font-size:11.5px;color:var(--ink-soft);
    margin:0 0 6px;font-style:italic;
  }
  .av-nav{display:flex;justify-content:space-between;align-items:center;margin-top:22px;}
  .av-btn{
    font-family:"Helvetica Neue",Arial,sans-serif;font-weight:600;font-size:13.5px;
    padding:11px 22px;border-radius:3px;border:none;cursor:pointer;letter-spacing:.01em;
  }
  .av-btn-primary{background:var(--navy);color:#fff;}
  .av-btn-primary:hover{background:var(--navy-deep);}
  .av-btn-ghost{background:transparent;color:var(--ink-soft);border:1.5px solid var(--line);}
  .av-btn-ghost:hover{border-color:var(--ink-soft);}
  .av-btn:disabled{opacity:.4;cursor:not-allowed;}
  .av-done{text-align:center;padding:50px 20px;}
  .av-done-mark{
    width:56px;height:56px;border-radius:50%;background:var(--good);color:#fff;
    display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:26px;
  }
  .av-done h2{color:var(--navy-deep);font-size:21px;margin-bottom:8px;}
  .av-done p{font-family:"Helvetica Neue",Arial,sans-serif;color:var(--ink-soft);font-size:13.5px;}
  .av-footer-link{
    text-align:center;margin-top:26px;font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:11px;color:var(--ink-soft);opacity:.55;
  }
  .av-footer-link button{
    background:none;border:none;color:inherit;text-decoration:underline;cursor:pointer;font-size:11px;font-family:inherit;
  }
  /* Admin / results */
  .av-modal-bg{
    position:fixed;inset:0;background:rgba(19,36,68,.55);display:flex;
    align-items:center;justify-content:center;z-index:50;padding:20px;
  }
  .av-modal{background:#fff;border-radius:4px;padding:26px;max-width:340px;width:100%;}
  .av-modal h3{font-size:16px;color:var(--navy-deep);margin:0 0 12px;}
  .av-modal input{
    width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:3px;
    font-family:"Helvetica Neue",Arial,sans-serif;font-size:14px;margin-bottom:12px;
  }
  .av-modal-row{display:flex;gap:8px;justify-content:flex-end;}
  .av-results-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:22px;flex-wrap:wrap;gap:10px;}
  .av-count-pill{
    font-family:"Helvetica Neue",Arial,sans-serif;font-size:12px;color:var(--navy);
    background:var(--paper-2);padding:4px 12px;border-radius:20px;font-weight:600;
  }
  .av-res-block{margin-bottom:26px;padding-bottom:22px;border-bottom:1px solid var(--line);}
  .av-res-block:last-of-type{border-bottom:none;}
  .av-res-block-title{font-size:16px;font-weight:700;color:var(--navy-deep);margin-bottom:14px;}
  .av-res-q{margin-bottom:16px;}
  .av-res-q-text{font-family:"Helvetica Neue",Arial,sans-serif;font-size:12.5px;color:var(--ink);font-weight:700;margin-bottom:8px;}
  .av-comments-list{font-family:"Helvetica Neue",Arial,sans-serif;font-size:12.5px;}
  .av-comment-card{background:var(--paper);border-left:3px solid var(--gold);padding:8px 12px;margin-bottom:8px;border-radius:0 3px 3px 0;color:var(--ink);}
  .av-empty{font-family:"Helvetica Neue",Arial,sans-serif;color:var(--ink-soft);font-size:13px;text-align:center;padding:30px 0;}
  .av-empty-inline{font-family:"Helvetica Neue",Arial,sans-serif;color:var(--ink-soft);font-size:12px;font-style:italic;}
</style>
</head>

  function renderHero(){
    return `
      <div class="av-hero">
        <img src="${HERO_IMG}" alt="Fachada da EE Maya Alice Ekman" />
        <span class="av-hero-tag">EE Maya Alice Ekman</span>
        <div class="av-hero-band"></div>
      </div>`;
  }

  let state = {
    step: 0,
    identificacao: '',
    respostas: {},      // "b1_0" -> texto
    submitted: false,
    view: 'form',        // form | results
  };

  const shell = document.getElementById('av-shell');

  function qKey(blockId, idx){ return blockId + '_' + idx; }

  function validateCurrentBlock(block){
    let firstInvalid = null;
    block.questions.forEach((q, idx) => {
      const key = qKey(block.id, idx);
      const len = (state.respostas[key] || '').trim().length;
      const textarea = shell.querySelector('textarea[data-key="'+key+'"]');
      if (len < MIN_CHARS){
        if (textarea) textarea.classList.add('av-invalid');
        if (!firstInvalid) firstInvalid = textarea;
      } else {
        if (textarea) textarea.classList.remove('av-invalid');
      }
    });
    if (firstInvalid){
      firstInvalid.scrollIntoView({behavior:'smooth', block:'center'});
      firstInvalid.focus();
      return false;
    }
    return true;
  }

  function render(){
    if (state.view === 'results') return renderResults();
    if (state.submitted) return renderDone();
    return renderForm();
  }

  function renderProgress(){
    const pct = Math.round(((state.step) / TOTAL_STEPS) * 100 + (100/TOTAL_STEPS)*0.15);
    const block = BLOCKS[state.step];
    return `
      <div class="av-progress-wrap">
        <div class="av-progress-track"><div class="av-progress-fill" style="width:${pct}%"></div></div>
        <div class="av-progress-label"><span>Etapa ${state.step+1} de ${TOTAL_STEPS}</span><span>${block.numeral} — ${block.title}</span></div>
      </div>`;
  }

  function renderForm(){
    const block = BLOCKS[state.step];
    const isLast = state.step === TOTAL_STEPS - 1;

    const idBox = state.step===0 ? `
      <div class="av-id-box">
        <div class="av-comment-label">Nome completo (obrigatório) — usado apenas para evitar respostas duplicadas</div>
        <input type="text" class="av-comment" id="av-id-input" style="min-height:auto;padding:10px 13px;" placeholder="Digite seu nome completo" value="${escapeHtml(state.identificacao)}" />
        <div class="av-error" id="av-id-error" style="display:none;color:var(--warn);font-family:'Helvetica Neue',Arial,sans-serif;font-size:12px;margin-top:6px;">Preencha seu nome para continuar.</div>
      </div>` : '';

    const intro = state.step===0 ? `
      <div class="av-intro">
        <strong>Prezados(as),</strong> a avaliação institucional é uma ferramenta fundamental para assegurar a qualidade do ensino e o fortalecimento da gestão escolar. Por meio dela é possível:
        <ul>
          <li>Identificar potencialidades e oportunidades de melhoria;</li>
          <li>Subsidiar decisões pedagógicas e administrativas;</li>
          <li>Promover a transparência e ampliar a participação de toda a equipe.</li>
        </ul>
      </div>` : '';

    const questionsHtml = block.questions.map((q, idx) => {
      const key = qKey(block.id, idx);
      const len = (state.respostas[key] || '').trim().length;
      const cls = len >= MIN_CHARS ? 'ok' : 'low';
      return `
      <div class="av-item">
        <div class="av-item-text">${q}</div>
        <textarea class="av-comment" data-key="${key}" placeholder="Escreva livremente (mínimo de duas linhas)...">${escapeHtml(state.respostas[key] || '')}</textarea>
        <div class="av-charcount ${cls}" id="count-${key}">${len} / ${MIN_CHARS} caracteres mínimos</div>
      </div>`;
    }).join('');

    shell.innerHTML = `
      ${state.step===0 ? renderHero() : ''}
      <div class="av-eyebrow">EE Maya Alice Ekman</div>
      <div class="av-title">Avaliação Institucional <span class="av-title-accent">1º Semestre - 2026</span></div>
      <div class="av-sub">identificação obrigatória, uso restrito à equipe gestora</div>
      ${renderProgress()}
      <div class="av-card" style="--block-color:${blockColor(state.step)}">
        ${idBox}
        ${intro}
        <div class="av-block-title"><span class="av-block-num">${block.numeral}</span> ${block.title}</div>
        <div class="av-block-hint">Responda com suas próprias palavras — não há certo ou errado.</div>
        ${questionsHtml}
        <div class="av-nav">
          <button class="av-btn av-btn-ghost" id="av-back" ${state.step===0?'disabled':''}>Voltar</button>
          <button class="av-btn av-btn-primary" id="av-next">${isLast ? 'Enviar avaliação' : 'Continuar'}</button>
        </div>
      </div>
      <div class="av-footer-link"><button id="av-admin-link">Sou da equipe gestora — ver resultados</button></div>
    `;

    shell.querySelectorAll('textarea[data-key]').forEach(t=>{
      t.addEventListener('input', e=>{
        const key = e.target.dataset.key;
        state.respostas[key] = e.target.value;
        const len = e.target.value.trim().length;
        const counter = document.getElementById('count-'+key);
        if (counter){
          counter.textContent = len + ' / ' + MIN_CHARS + ' caracteres mínimos';
          counter.classList.toggle('ok', len >= MIN_CHARS);
          counter.classList.toggle('low', len < MIN_CHARS);
        }
        if (len >= MIN_CHARS) e.target.classList.remove('av-invalid');
      });
    });
    const idInput = document.getElementById('av-id-input');
    if (idInput) idInput.addEventListener('input', e=>{ state.identificacao = e.target.value; });

    document.getElementById('av-back').addEventListener('click', ()=>{
      if (state.step>0){ state.step--; render(); window.scrollTo(0,0); }
    });
    document.getElementById('av-next').addEventListener('click', async ()=>{
      if (state.step===0 && !state.identificacao.trim()){
        const err = document.getElementById('av-id-error');
        if (err) err.style.display='block';
        document.getElementById('av-id-input').focus();
        return;
      }
      if (!validateCurrentBlock(block)){
        return;
      }
      if (isLast){
        const btn = document.getElementById('av-next');
        btn.disabled = true;
        btn.textContent = 'Enviando...';
        const dup = await checkDuplicate(state.identificacao);
        if (dup){
          shell.innerHTML = `
            ${renderHero()}
            <div class="av-eyebrow">EE Maya Alice Ekman</div>
            <div class="av-title">Avaliação Institucional <span class="av-title-accent">1º Semestre - 2026</span></div>
            <div class="av-card av-done" style="--block-color:var(--warn)">
              <div class="av-done-mark" style="background:var(--warn);">!</div>
              <h2>Este nome já respondeu a avaliação</h2>
              <p>Encontramos uma resposta anterior com o nome "${escapeHtml(state.identificacao.trim())}". Cada pessoa pode responder apenas uma vez. Se você acredita que isso é um engano, procure a equipe gestora.</p>
            </div>`;
          return;
        }
        await submitResponse();
      } else {
        state.step++;
        render();
        window.scrollTo(0,0);
      }
    });
    document.getElementById('av-admin-link').addEventListener('click', openAdminModal);
  }

  function normName(s){
    return (s||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ');
  }

  async function checkDuplicate(nome){
    const alvo = normName(nome);
    if (!alvo) return false;
    try{
      const existentes = await loadAllResponses();
      return existentes.some(r => normName(r.identificacao) === alvo);
    }catch(e){
      console.error('Falha ao checar duplicidade', e);
      return false; // em caso de falha de rede, não bloqueia o envio
    }
  }

  function renderDone(){
    shell.innerHTML = `
      ${renderHero()}
      <div class="av-eyebrow">EE Maya Alice Ekman</div>
      <div class="av-title">Avaliação Institucional <span class="av-title-accent">1º Semestre - 2026</span></div>
      <div class="av-card av-done" style="--block-color:var(--leaf)">
        <div class="av-done-mark">✓</div>
        <h2>Resposta enviada. Obrigada!</h2>
        <p>Sua avaliação foi registrada e vai contribuir para o planejamento do próximo semestre.</p>
      </div>
      <div class="av-footer-link"><button id="av-admin-link">Sou da equipe gestora — ver resultados</button></div>
    `;
    document.getElementById('av-admin-link').addEventListener('click', openAdminModal);
  }

  async function submitResponse(){
    const record = {
      identificacao: state.identificacao || '',
      respostas: state.respostas,
      ts: Date.now(),
    };
    try{
      const r = await fetch(FB_URL + '/avaliacao2026/respostas.json', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(record),
      });
      if (!r.ok) throw new Error('fb error');
    }catch(e){
      console.error('Falha ao salvar resposta', e);
      alert('Não foi possível enviar sua resposta agora. Verifique sua conexão e tente novamente.');
      const btn = document.getElementById('av-next');
      if (btn){ btn.disabled = false; btn.textContent = 'Enviar avaliação'; }
      return;
    }
    state.submitted = true;
    render();
  }

  function openAdminModal(){
    const bg = document.createElement('div');
    bg.className = 'av-modal-bg';
    bg.innerHTML = `
      <div class="av-modal">
        <h3>Área da equipe gestora</h3>
        <input type="password" id="av-code" placeholder="Código de acesso" />
        <div class="av-modal-row">
          <button class="av-btn av-btn-ghost" id="av-cancel">Cancelar</button>
          <button class="av-btn av-btn-primary" id="av-enter">Entrar</button>
        </div>
      </div>`;
    document.body.appendChild(bg);
    document.getElementById('av-cancel').addEventListener('click', ()=> bg.remove());
    document.getElementById('av-enter').addEventListener('click', ()=>{
      const val = document.getElementById('av-code').value;
      if (val === ADMIN_CODE){
        bg.remove();
        state.view = 'results';
        render();
      } else {
        document.getElementById('av-code').style.borderColor = 'var(--warn)';
      }
    });
  }

  async function loadAllResponses(){
    try{
      const r = await fetch(FB_URL + '/avaliacao2026/respostas.json');
      if (!r.ok) return [];
      const data = await r.json();
      if (!data) return [];
      return Object.values(data);
    }catch(e){
      console.error('Falha ao carregar respostas', e);
      return [];
    }
  }

  function idTag(r){
    return (r.identificacao && r.identificacao.trim())
      ? `<div style="font-weight:700;color:var(--navy);font-size:11px;margin-bottom:2px;">${escapeHtml(r.identificacao.trim())}</div>`
      : '';
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  }

  async function renderResults(){
    shell.innerHTML = `<div class="av-empty">Carregando respostas...</div>`;
    const responses = await loadAllResponses();

    let html = `
      <div class="av-eyebrow">EE Maya Alice Ekman</div>
      <div class="av-title">Resultados — Avaliação Institucional</div>
      <div class="av-sub">1º semestre de 2026</div>
      <div class="av-results-head">
        <span class="av-count-pill">${responses.length} resposta${responses.length===1?'':'s'}</span>
        <button class="av-btn av-btn-ghost" id="av-export">Exportar CSV</button>
      </div>
    `;

    if (!responses.length){
      html += `<div class="av-card"><div class="av-empty">Ainda não há respostas registradas.</div></div>`;
    } else {
      html += `<div class="av-card">`;
      BLOCKS.forEach(block=>{
        html += `<div class="av-res-block">
          <div class="av-res-block-title">${block.numeral} — ${block.title}</div>`;
        block.questions.forEach((q, idx)=>{
          const key = qKey(block.id, idx);
          const answers = responses.filter(r=>r.respostas && r.respostas[key] && r.respostas[key].trim());
          html += `
            <div class="av-res-q">
              <div class="av-res-q-text">${q}</div>
              <div class="av-comments-list">
                ${answers.length ? answers.map(r=>`<div class="av-comment-card">${idTag(r)}${escapeHtml(r.respostas[key])}</div>`).join('') : '<div class="av-empty-inline">Sem respostas.</div>'}
              </div>
            </div>`;
        });
        html += `</div>`;
      });
      html += `</div>`;
    }

    html += `<div class="av-footer-link"><button id="av-back-form">Voltar ao formulário</button></div>`;
    shell.innerHTML = html;

    const exportBtn = document.getElementById('av-export');
    if (exportBtn) exportBtn.addEventListener('click', ()=> exportCsv(responses));
    document.getElementById('av-back-form').addEventListener('click', ()=>{
      state.view = 'form';
      render();
    });
  }

  function exportCsv(responses){
    const allKeys = BLOCKS.flatMap(b=>b.questions.map((_,idx)=>qKey(b.id, idx)));
    const header = ['ts', 'identificacao', ...allKeys];
    const rows = responses.map(r=>{
      return header.map(h=>{
        if (h==='ts') return new Date(r.ts).toLocaleString('pt-BR');
        if (h==='identificacao') return '"'+String(r.identificacao||'').replace(/"/g,'""')+'"';
        return '"'+String((r.respostas && r.respostas[h]) || '').replace(/"/g,'""')+'"';
      }).join(',');
    });
    const csv = [header.join(','), ...rows].join('\\n');
    const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'avaliacao_institucional_1sem2026.csv';
    a.click();
    URL.revokeObjectURL(url);
  }

  render();
})();
</script>
</body>
</html>
